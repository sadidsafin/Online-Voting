<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Candidates — Bangladesh Election 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --red: #c8102e; --green: #006a4e; --green-dark: #004d38;
  --gold: #d4a843; --cream: #f5f0e8; --ink: #1a1209;
  --muted: #6b5e4e; --surface: #ffffff; --border: #ddd5c8;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Barlow', sans-serif;
  background: #f0ebe1;
  min-height: 100vh;
  padding-bottom: 60px;
}

.top-bar { height: 4px; background: linear-gradient(90deg, var(--green), var(--red), var(--green)); }

.page-header {
  background: var(--ink);
  padding: 20px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}

.header-brand {
  font-family: 'Libre Baskerville', serif;
  font-size: 16px; color: white;
}

.header-actions { display: flex; gap: 12px; }

.nav-btn {
  padding: 8px 18px;
  font-family: 'Barlow', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  border-radius: 2px; cursor: pointer; text-decoration: none; transition: all 0.2s;
  border: none;
}

.nav-btn-home { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
.nav-btn-home:hover { background: rgba(255,255,255,0.2); }
.nav-btn-vote { background: var(--red); color: white; }
.nav-btn-vote:hover { background: #a50d25; }

.page-hero {
  background: var(--ink);
  padding: 60px 40px 48px;
  border-bottom: 3px solid var(--red);
}

.page-hero-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 10px;
}

.page-hero h1 {
  font-family: 'Libre Baskerville', serif;
  font-size: clamp(28px, 4vw, 44px);
  color: white; margin-bottom: 8px;
}

.page-hero p { font-size: 15px; color: rgba(255,255,255,0.5); }

/* Search + filter bar */
.filter-bar {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 16px 40px;
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
  position: sticky;
  top: 61px;
  z-index: 90;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.search-wrap { position: relative; flex: 1; min-width: 220px; }

.search-wrap input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  font-family: 'Barlow', sans-serif;
  font-size: 14px; color: var(--ink);
  background: #f9f6f1;
  border: 1.5px solid var(--border); border-radius: 2px;
  outline: none; transition: border-color 0.2s;
}

.search-wrap input:focus { border-color: var(--green); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; }

.party-filter { display: flex; gap: 8px; flex-wrap: wrap; }

.party-chip {
  padding: 7px 14px;
  font-family: 'Barlow', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  border-radius: 99px; border: 1.5px solid var(--border);
  background: white; color: var(--muted); cursor: pointer;
  transition: all 0.2s;
}

.party-chip:hover   { border-color: var(--ink); color: var(--ink); }
.party-chip.active  { background: var(--ink); color: white; border-color: var(--ink); }
.party-chip.bnp.active   { background: #1a3a6b; border-color: #1a3a6b; }
.party-chip.ncp.active   { background: var(--green); border-color: var(--green); }
.party-chip.dari.active  { background: #7c3aed; border-color: #7c3aed; }

.stats-bar {
  padding: 12px 40px;
  font-size: 12px;
  color: var(--muted);
  background: #ece8e0;
  border-bottom: 1px solid var(--border);
}

.stats-bar strong { color: var(--ink); }

/* Content */
.content { padding: 32px 40px; }

@media (max-width: 600px) {
  .content { padding: 20px 16px; }
  .filter-bar { padding: 14px 16px; }
  .page-hero { padding: 40px 16px 32px; }
  .page-header { padding: 16px; }
}

.region-section { margin-bottom: 48px; }

.region-heading {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
}

.region-heading h2 {
  font-family: 'Libre Baskerville', serif;
  font-size: 20px; color: var(--ink);
}

.region-count {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  background: var(--cream); border: 1px solid var(--border);
  border-radius: 99px; padding: 3px 10px; color: var(--muted);
}

.candidates-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}

/* Candidate mini card */
.mini-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  transition: box-shadow 0.2s, transform 0.15s;
}

.mini-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-2px); }

.mini-cover {
  height: 70px;
  position: relative;
  overflow: hidden;
}

/* Real cover photo fills the cover strip */
.mini-cover-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
}

.mini-avatar {
  position: absolute;
  bottom: -18px; left: 14px;
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2.5px solid white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* Real candidate photo (circular, same position as letter avatar) */
.mini-avatar-img {
  position: absolute;
  bottom: -18px; left: 14px;
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2.5px solid white;
  object-fit: cover;
  object-position: top center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  z-index: 2;
}

.mini-party-tag {
  position: absolute;
  top: 8px; right: 8px;
  background: white;
  border-radius: 3px;
  padding: 2px 7px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

.mini-body { padding: 24px 14px 14px; }

.mini-name {
  font-family: 'Libre Baskerville', serif;
  font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 2px;
}

.mini-party-name { font-size: 11px; color: var(--muted); }

.no-results {
  text-align: center; padding: 60px 24px;
  color: var(--muted); font-size: 15px;
}
</style>

<!-- ── CANDIDATES PAGE BACKGROUND ── -->
<style>
body { position: relative; }

/* Parliament / civic building photo backdrop */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=1600&q=80&fit=crop");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  opacity: 0.09;
  pointer-events: none;
  z-index: 0;
}

/* Warm tint overlay so cards pop over the photo */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,106,78,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 100%, rgba(200,16,46,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Lift all content above pseudo-elements */
.top-bar, .page-header, .page-hero, .filter-bar,
.stats-bar, .content { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="top-bar"></div>

<div class="page-header">
  <div class="header-brand">🇧🇩 Bangladesh Election 2026</div>
  <div class="header-actions">
    <a href="index.html" class="nav-btn nav-btn-home">← Home</a>
    <a href="results.html" class="nav-btn nav-btn-home">📊 Results</a>
    <a href="login.html" class="nav-btn nav-btn-vote">🗳️ Vote</a>
  </div>
</div>

<div class="page-hero">
  <p class="page-hero-label">2026 General Election</p>
  <h1>All Candidates</h1>
  <p>Browse all registered candidates across every constituency in Bangladesh.</p>
</div>

<div class="filter-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search candidate or region…" oninput="filterCandidates()" />
  </div>
  <div class="party-filter">
    <button class="party-chip active" data-party="all" onclick="setParty(this, 'all')">All Parties</button>
    <button class="party-chip bnp"  data-party="BNP"       onclick="setParty(this, 'BNP')">⚡ BNP</button>
    <button class="party-chip ncp"  data-party="NCP"       onclick="setParty(this, 'NCP')">🌿 NCP</button>
    <button class="party-chip dari" data-party="Daripalla" onclick="setParty(this, 'Daripalla')">🌸 Daripalla</button>
  </div>
</div>

<div class="stats-bar" id="stats-bar">Loading candidates…</div>

<div class="content" id="content">
  <div style="text-align:center; padding:60px 0; color:var(--muted)">
    <div style="width:28px;height:28px;border:2px solid #ddd;border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;"></div>
    Loading…
  </div>
</div>

<style>
@keyframes spin { to { transform:rotate(360deg); } }
</style>

<script>
  const API_BASE = 'http://127.0.0.1:8000';

  const partyColors = {
    'BNP': ['#1a3a6b', '#2563ae'],
    'NCP': ['#006a4e', '#0d9e73'],
    'Daripalla': ['#7c3aed', '#a855f7'],
    'default': ['#374151', '#6b7280'],
  };

  function getColors(party) { return partyColors[party] || partyColors.default; }

  let allCandidates = [];
  let activeParty   = 'all';

  async function loadAll() {
    try {
      const res  = await fetch(`${API_BASE}/api/candidates/`);
      allCandidates = await res.json();
      renderCandidates(allCandidates);
    } catch (err) {
      document.getElementById('content').innerHTML =
        '<p style="color:#b91c1c;text-align:center;padding:60px">Could not load candidates. Is Django running?</p>';
    }
  }

  function setParty(el, party) {
    activeParty = party;
    document.querySelectorAll('.party-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    filterCandidates();
  }

  function filterCandidates() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allCandidates.filter(c => {
      const matchParty  = activeParty === 'all' || c.party === activeParty;
      const matchSearch = !q || c.name.toLowerCase().includes(q) || (c.region || '').toLowerCase().includes(q) || c.party.toLowerCase().includes(q);
      return matchParty && matchSearch;
    });
    renderCandidates(filtered);
  }

  function renderCandidates(list) {
    document.getElementById('stats-bar').innerHTML =
      `Showing <strong>${list.length}</strong> candidate${list.length !== 1 ? 's' : ''} across <strong>${new Set(list.map(c => c.region)).size}</strong> constituencies`;

    if (list.length === 0) {
      document.getElementById('content').innerHTML =
        '<div class="no-results">No candidates match your search.</div>';
      return;
    }

    // Group by region
    const grouped = {};
    list.forEach(c => {
      const r = c.region || 'Unknown';
      if (!grouped[r]) grouped[r] = [];
      grouped[r].push(c);
    });

    const regions = Object.keys(grouped).sort();
    const html = regions.map(region => {
      const candidates = grouped[region];
      const cards = candidates.map(c => {
        const [bg1, bg2] = getColors(c.party);

        // Cover: real image if available, else colour gradient
        const coverInner = c.cover_photo_url
          ? `<img src="${API_BASE}${c.cover_photo_url}" class="mini-cover-img" alt="${c.name} cover" />`
          : '';
        const coverStyle = c.cover_photo_url ? '' : `background:linear-gradient(135deg,${bg1},${bg2})`;

        // Avatar: real photo if available, else letter
        const avatarHTML = c.photo_url
          ? `<img src="${API_BASE}${c.photo_url}" class="mini-avatar-img" alt="${c.name}" />`
          : `<div class="mini-avatar" style="background:${bg1}">${c.name.charAt(0)}</div>`;

        return `
          <div class="mini-card">
            <div class="mini-cover" style="${coverStyle}">
              ${coverInner}
              ${avatarHTML}
              <div class="mini-party-tag" style="color:${bg1}">${c.party}</div>
            </div>
            <div class="mini-body">
              <div class="mini-name">${c.name}</div>
              <div class="mini-party-name">${c.party}</div>
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="region-section">
          <div class="region-heading">
            <h2>📍 ${region}</h2>
            <span class="region-count">${candidates.length} candidate${candidates.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="candidates-row">${cards}</div>
        </div>
      `;
    }).join('');

    document.getElementById('content').innerHTML = html;
  }

  loadAll();
</script>
</body>
</html>
