{% extends "base.html" %}
{% block title %}Voter Login{% endblock %}

{% block content %}
<div class="card">
    <h1>Voter Verification</h1>
    <p class="subtitle">Enter your Voter ID to access the ballot.</p>

    <div id="error-msg" class="alert alert-error hidden"></div>

    <div>
        <label for="voter-id">Voter ID</label>
        <input type="number" id="voter-id" placeholder="e.g. 1001" min="1" />
        <button class="btn btn-primary" onclick="verifyVoter()">Verify &amp; Continue →</button>
    </div>

    <p style="margin-top:24px; font-size:13px; color:#a0aec0; text-align:center;">
        This is a simulated voting environment for demonstration purposes.
    </p>
</div>

<script>
function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.remove('hidden');
}

function hideError() {
    document.getElementById('error-msg').classList.add('hidden');
}

async function verifyVoter() {
    hideError();
    const voterId = document.getElementById('voter-id').value.trim();

    if (!voterId) {
        showError('Please enter your Voter ID.');
        return;
    }

    try {
        const res = await fetch(`/api/verify-voter/?voter_id=${voterId}`);
        const data = await res.json();

        if (data.error) {
            showError(data.error);
            return;
        }

        if (data.has_voted) {
            showError('This Voter ID has already cast a vote.');
            return;
        }

        // Store voter info in sessionStorage and redirect to voting page
        sessionStorage.setItem('voter_id', voterId);
        sessionStorage.setItem('voter_region', data.region);
        window.location.href = '/vote/';

    } catch (err) {
        showError('Something went wrong. Please try again.');
    }
}

// Allow Enter key to submit
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') verifyVoter();
});
</script>
{% endblock %}
