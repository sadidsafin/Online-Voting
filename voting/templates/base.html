<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Online Voting System{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            color: #2d3748;
            min-height: 100vh;
        }

        header {
            background: #1a365d;
            color: white;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        header .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        header .logo span {
            color: #63b3ed;
        }

        .container {
            max-width: 700px;
            margin: 48px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px;
        }

        h1 {
            font-size: 24px;
            color: #1a365d;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 32px;
            font-size: 14px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #4a5568;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #3182ce;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: #2b6cb0;
            color: white;
            width: 100%;
            margin-top: 20px;
        }

        .btn-primary:hover { background: #2c5282; }

        .btn-success {
            background: #276749;
            color: white;
            width: 100%;
            margin-top: 16px;
        }

        .btn-success:hover { background: #22543d; }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .alert-error {
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #feb2b2;
        }

        .alert-success {
            background: #f0fff4;
            color: #276749;
            border: 1px solid #9ae6b4;
        }

        .alert-info {
            background: #ebf8ff;
            color: #2b6cb0;
            border: 1px solid #bee3f8;
        }

        .hidden { display: none; }

        #loading {
            text-align: center;
            color: #718096;
            padding: 20px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🗳️ Online <span>Voting</span> System</div>
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
