{% extends "base.html" %}
{% block title %}Election Results{% endblock %}

{% block content %}
<div class="card">
    <h1>Election Results</h1>
    <p class="subtitle">Live vote counts per candidate.</p>

    <div id="loading">Loading results...</div>
    <div id="results-section" class="hidden"></div>
</div>

<style>
    .result-row {
        margin-bottom: 20px;
    }

    .result-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 15px;
    }

    .result-votes {
        color: #2b6cb0;
        font-size: 14px;
        font-weight: 700;
    }

    .bar-track {
        height: 14px;
        background: #e2e8f0;
        border-radius: 99px;
        overflow: hidden;
    }

    .bar-fill {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(90deg, #2b6cb0, #63b3ed);
        transition: width 0.6s ease;
    }

    .result-party {
        font-size: 12px;
        color: #a0aec0;
        margin-top: 2px;
    }

    .total-votes {
        text-align: right;
        font-size: 13px;
        color: #718096;
        margin-bottom: 20px;
    }

    .refresh-btn {
        background: none;
        border: 1px solid #cbd5e0;
        border-radius: 6px;
        padding: 6px 14px;
        font-size: 13px;
        cursor: pointer;
        color: #4a5568;
        margin-bottom: 20px;
        float: right;
    }

    .refresh-btn:hover { background: #f7fafc; }
</style>

<script>
    async function loadResults() {
        try {
            const res = await fetch('/api/simple-results/');
            const data = await res.json();

            const total = data.reduce((sum, r) => sum + r.votes, 0);
            const section = document.getElementById('results-section');

            if (total === 0) {
                section.innerHTML = '<p style="color:#718096; text-align:center;">No votes have been cast yet.</p>';
            } else {
                // Sort by votes descending
                data.sort((a, b) => b.votes - a.votes);

                section.innerHTML = `
                    <button class="refresh-btn" onclick="loadResults()">🔄 Refresh</button>
                    <div class="total-votes">Total votes cast: <strong>${total}</strong></div>
                    <div id="bars"></div>
                `;

                const bars = document.getElementById('bars');
                const colors = ['#2b6cb0', '#276749', '#744210', '#553c9a', '#97266d'];

                data.forEach((r, i) => {
                    const pct = total > 0 ? Math.round((r.votes / total) * 100) : 0;
                    const div = document.createElement('div');
                    div.className = 'result-row';
                    div.innerHTML = `
                        <div class="result-header">
                            <span>${r.candidate}</span>
                            <span class="result-votes">${r.votes} votes (${pct}%)</span>
                        </div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width:0%; background:${colors[i % colors.length]};" data-width="${pct}%"></div>
                        </div>
                    `;
                    bars.appendChild(div);
                });

                // Animate bars after render
                setTimeout(() => {
                    document.querySelectorAll('.bar-fill').forEach(bar => {
                        bar.style.width = bar.dataset.width;
                    });
                }, 50);
            }

            document.getElementById('loading').classList.add('hidden');
            section.classList.remove('hidden');

        } catch (err) {
            document.getElementById('loading').textContent = 'Failed to load results.';
        }
    }

    loadResults();
</script>
{% endblock %}
